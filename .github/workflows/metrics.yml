name: Metrics
on:
  # Corre automáticamente a las 06:00 UTC (3 AM Argentina)
  schedule: [{cron: "0 6 * * *"}]
  # Permite correrlo manualmente para probar
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Configuración básica
          user: valepognante4
          template: classic
          base: header, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires
          
          # Plugin de lenguajes (para que se vea Java, Spring Boot, etc.)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
